name: Deploy Backend — cubiculo-api.castelancarpinteyro.com

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-castcarp.yml"
  workflow_dispatch:

jobs:
  deploy-backend-castcarp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deploy directory permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: cubiculo-api.castelancarpinteyro.com
          username: cuboest
          password: ${{ secrets.CASTCARP_SSH_PASSWORD }}
          script: |
            set -e
            SUDOPASS="${{ secrets.CASTCARP_SUDO_PASSWORD }}"
            echo "$SUDOPASS" | sudo -S mkdir -p /opt/cubiculo
            echo "$SUDOPASS" | sudo -S chown -R cuboest:cuboest /opt/cubiculo

      - name: Deploy backend files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: cubiculo-api.castelancarpinteyro.com
          username: cuboest
          password: ${{ secrets.CASTCARP_SSH_PASSWORD }}
          source: "backend/*"
          target: /opt/cubiculo
          overwrite: true
          strip_components: 1

      - name: Install dependencies and restart backend service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: cubiculo-api.castelancarpinteyro.com
          username: cuboest
          password: ${{ secrets.CASTCARP_SSH_PASSWORD }}
          script: |
            set -e
            SUDOPASS="${{ secrets.CASTCARP_SUDO_PASSWORD }}"
            cd /opt/cubiculo

            if [ ! -d ".venv" ]; then python3 -m venv .venv; fi
            source .venv/bin/activate
            pip install --upgrade pip --quiet
            pip install -r requirements.txt --quiet
            alembic upgrade head

            SERVICE_NAME="cubiculo-backend-castcarp"
            SERVICE_FILE="/etc/systemd/system/${SERVICE_NAME}.service"
            APP_DIR="/opt/cubiculo"
            APP_USER="cuboest"
            APP_GROUP="cuboest"

            if ! echo "$SUDOPASS" | sudo -S systemctl list-unit-files 2>/dev/null | grep -q "^${SERVICE_NAME}\.service"; then
              echo "$SUDOPASS" | sudo -S tee "$SERVICE_FILE" > /dev/null <<EOF
            [Unit]
            Description=Cubiculo Backend API — castelancarpinteyro.com
            After=network.target

            [Service]
            User=${APP_USER}
            Group=${APP_GROUP}
            WorkingDirectory=${APP_DIR}
            EnvironmentFile=${APP_DIR}/.env
            Environment=PYTHONUNBUFFERED=1
            ExecStart=${APP_DIR}/.venv/bin/uvicorn app.main:app --host 127.0.0.1 --port 8087
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

              echo "$SUDOPASS" | sudo -S systemctl daemon-reload
              echo "$SUDOPASS" | sudo -S systemctl enable "${SERVICE_NAME}"
            fi

            echo "$SUDOPASS" | sudo -S systemctl restart "${SERVICE_NAME}"
            echo "$SUDOPASS" | sudo -S systemctl --no-pager --full status "${SERVICE_NAME}" || true
