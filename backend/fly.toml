app = "cubiculoapp-api-dou1013"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  DEBUG = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[deploy]
  release_command = "alembic upgrade head"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512